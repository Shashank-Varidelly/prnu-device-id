name: CI — Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: |
          # Stop build on syntax errors or undefined names
          flake8 prnu/ models/ evaluation/ experiments/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings (non-blocking)
          flake8 prnu/ models/ evaluation/ experiments/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Check formatting with black
        run: |
          black --check --diff prnu/ models/ evaluation/ experiments/ tests/

      - name: Check import order with isort
        run: |
          isort --check-only --diff prnu/ models/ evaluation/ experiments/ tests/

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --tb=short --cov=prnu --cov=evaluation --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
